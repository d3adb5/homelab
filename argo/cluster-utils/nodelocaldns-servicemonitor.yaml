# The node-local-dns manifest already ships a headless metrics Service
# on 9253; only Prometheus discovery was missing.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: node-local-dns
  namespace: kube-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      k8s-app: node-local-dns
  endpoints:
    - port: metrics
