apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: kube-prometheus-stack-oauth2-proxy
spec:
  forwardAuth:
    address: http://kube-prometheus-stack-oauth2-proxy.monitoring.svc.cluster.local
    trustForwardHeader: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: victoria-logs-oauth2-proxy
spec:
  forwardAuth:
    address: http://victoria-logs-oauth2-proxy.monitoring.svc.cluster.local
    trustForwardHeader: true
