# PGO adds the OTel collector sidecar but ships no monitor resource, so
# target the cluster label; only pods exposing otel-metrics become targets.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: keycloak-postgres-metrics
spec:
  selector:
    matchLabels:
      postgres-operator.crunchydata.com/cluster: keycloak
  podMetricsEndpoints:
    - port: otel-metrics
