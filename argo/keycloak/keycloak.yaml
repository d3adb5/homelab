apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: keycloak
spec:
  instances: 1
  additionalOptions:
    - name: metrics-enabled
      value: "true"
  # The operator generates a ServiceMonitor against the management port
  # once metrics are enabled; the label gets Prometheus to select it.
  serviceMonitor:
    labels:
      release: kube-prometheus-stack
  db:
    vendor: postgres
    host: keycloak-pgbouncer
    database: keycloak
    schema: keycloak
    usernameSecret:
      name: keycloak-pguser-keycloak
      key: user
    passwordSecret:
      name: keycloak-pguser-keycloak
      key: password
  http:
    tlsSecret: keycloak-tls
  hostname:
    hostname: id.d3adb5.ca
  proxy:
    headers: xforwarded
  ingress:
    enabled: false
