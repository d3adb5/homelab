apiVersion: k8s.keycloak.org/v2beta1
kind: Keycloak
metadata:
  name: keycloak
spec:
  instances: 3
  update:
    strategy: Auto
  scheduling:
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: keycloak
                app.kubernetes.io/instance: keycloak
                app.kubernetes.io/component: server
            topologyKey: kubernetes.io/hostname
  additionalOptions:
    - name: metrics-enabled
      value: "true"
    # Latency histograms and user event counters, needed by the official
    # Keycloak Grafana dashboards.
    - name: http-metrics-histograms-enabled
      value: "true"
    - name: event-metrics-user-enabled
      value: "true"
  db:
    vendor: postgres
    host: keycloak-pgbouncer
    database: keycloak
    schema: keycloak
    url: jdbc:postgresql://keycloak-pgbouncer:5432/keycloak?targetServerType=any
    usernameSecret:
      name: keycloak-pguser-keycloak
      key: user
    passwordSecret:
      name: keycloak-pguser-keycloak
      key: password
  http:
    tlsSecret: keycloak-tls
  hostname:
    hostname: id.d3adb5.ca
  proxy:
    headers: xforwarded
  ingress:
    enabled: false
