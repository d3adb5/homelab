apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: navidrome-metrics-block
spec:
  ipAllowList:
    sourceRange:
      - 127.0.0.1/32
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: navidrome-oauth2-proxy
spec:
  forwardAuth:
    address: http://navidrome-oauth2-proxy.media.svc.cluster.local
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-Preferred-Username
---
# Strips the identity header Navidrome trusts, so clients can't inject
# it themselves on routes that bypass the forward auth middleware.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: navidrome-drop-auth-headers
spec:
  headers:
    customRequestHeaders:
      X-Auth-Request-Preferred-Username: ""
