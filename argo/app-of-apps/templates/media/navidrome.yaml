apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: navidrome
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: media

  sources:
    - repoURL: {{ .Values.repository.homelab.url }}
      targetRevision: {{ .Values.repository.homelab.targetRevision }}
      path: argo/media/navidrome

    - repoURL: https://oauth2-proxy.github.io/manifests
      targetRevision: 10.7.0
      chart: oauth2-proxy

      helm:
        valuesObject:
          config:
            existingSecret: navidrome-oidc-secrets

            configFile: |-
              email_domains = ["*"]
              provider = "keycloak-oidc"
              oidc_issuer_url = "https://id.d3adb5.ca/realms/core"
              redirect_url = "https://navidrome.d3adb5.ca/oauth2/callback"
              code_challenge_method = "S256"
              allowed_groups = ["/Navidrome"]
              upstreams = [ "static://202" ]
              reverse_proxy = true
              skip_provider_button = true
              set_xauthrequest = true

          metrics:
            serviceMonitor:
              enabled: true
              labels:
                release: kube-prometheus-stack

          ingress:
            enabled: true
            className: traefik
            annotations:
              {{- toYaml .Values.ingress.oauth2ProxyIngressAnnotations | nindent 14 }}
            hosts:
              - "navidrome.d3adb5.ca"
            path: /oauth2
            tls:
              - hosts:
                  - "navidrome.d3adb5.ca"
                secretName: navidrome-tls

    - repoURL: oci.trueforge.org/truecharts
      chart: navidrome
      targetRevision: 23.9.1

      helm:
        valuesObject:
          workload:
            main:
              podSpec:
                containers:
                  main:
                    env:
                      ND_MUSICFOLDER: /music
                      ND_PROMETHEUS_ENABLED: "true"
                      ND_ENABLESHARING: "true"
                      ND_EXTAUTH_TRUSTEDSOURCES: 10.244.0.0/16,192.168.1.0/27
                      ND_EXTAUTH_USERHEADER: X-Auth-Request-Preferred-Username
                      ND_EXTAUTH_LOGOUTURL: https://navidrome.d3adb5.ca/oauth2/sign_out

          persistence:
            data:
              enabled: true
              type: pvc
              storageClass: longhorn
              size: 10Gi
            music:
              existingClaim: {{ .Values.media.libraries.music.claimName }}
              subPath: library
              mountPath: /music
              readOnly: true

          # Scrapes the /metrics endpoint ND_PROMETHEUS_ENABLED already
          # exposes. External access to it stays blocked by the
          # metrics-block middleware below.
          metrics:
            main:
              enabled: true
              type: servicemonitor
              labels:
                release: kube-prometheus-stack
              endpoints:
                - port: main
                  path: /metrics

          ingress:
            main:
              enabled: true
              ingressClassName: traefik
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt
                traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.media.namespace }}-navidrome-drop-auth-headers@kubernetescrd,{{ .Values.media.namespace }}-navidrome-oauth2-proxy@kubernetescrd
              hosts:
                - host: navidrome.d3adb5.ca
              tls:
                - hosts:
                    - navidrome.d3adb5.ca
                  secretName: navidrome-tls

            # The Subsonic API and public shares skip the forward auth
            # middleware: Subsonic clients can't complete an OIDC flow, so
            # /rest falls back to Navidrome's native authentication scheme,
            # and /share is meant to be reachable without credentials.
            # Spoofed identity headers are still stripped on the way in.
            auth-bypass:
              enabled: true
              ingressClassName: traefik
              annotations:
                traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.media.namespace }}-navidrome-drop-auth-headers@kubernetescrd
              hosts:
                - host: navidrome.d3adb5.ca
                  paths:
                    - path: /rest
                      pathType: Prefix
                    - path: /share
                      pathType: Prefix
              tls:
                - hosts:
                    - navidrome.d3adb5.ca
                  secretName: navidrome-tls

            # Routes /metrics through a middleware that rejects every client,
            # standing in for the location block Ingress NGINX used to have.
            metrics-block:
              enabled: true
              ingressClassName: traefik
              annotations:
                traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.media.namespace }}-navidrome-metrics-block@kubernetescrd
              hosts:
                - host: navidrome.d3adb5.ca
                  paths:
                    - path: /metrics
                      pathType: Prefix
              tls:
                - hosts:
                    - navidrome.d3adb5.ca
                  secretName: navidrome-tls

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.media.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
