apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: transmission-tv
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: media

  sources:
    - repoURL: {{ .Values.repository.homelab.url }}
      targetRevision: {{ .Values.repository.homelab.targetRevision }}
      path: argo/media/transmission-tv

    - repoURL: https://oauth2-proxy.github.io/manifests
      targetRevision: 10.7.0
      chart: oauth2-proxy

      helm:
        valuesObject:
          config:
            existingSecret: transmission-tv-oidc-secrets

            configFile: |-
              email_domains = ["*"]
              provider = "keycloak-oidc"
              oidc_issuer_url = "https://id.d3adb5.ca/realms/core"
              redirect_url = "https://tv.transmission.d3adb5.ca/oauth2/callback"
              code_challenge_method = "S256"
              allowed_groups = ["/Transmission"]
              upstreams = [ "static://202" ]
              reverse_proxy = true
              skip_provider_button = true

          metrics:
            serviceMonitor:
              enabled: true
              labels:
                release: kube-prometheus-stack

          ingress:
            enabled: true
            className: traefik
            annotations:
              {{- toYaml .Values.ingress.oauth2ProxyIngressAnnotations | nindent 14 }}
            hosts:
              - "tv.transmission.d3adb5.ca"
            path: /oauth2
            tls:
              - hosts:
                  - "tv.transmission.d3adb5.ca"
                secretName: transmission-tv-tls

    - repoURL: https://charts.d3adb5.net
      targetRevision: 0.3.0
      chart: transmission

      helm:
        valuesObject:
          transmission:
            generateCredentials: false
          image:
            repository: lscr.io/linuxserver/transmission
            pullPolicy: IfNotPresent
            tag: "4.1.2@sha256:aa4926b22bc25e89820acf427f8a5d1426c34a7ae9bd834e06eda43b12d839c3"
          replicaCount: 1
          resources:
            requests:
              cpu: 350m
              memory: 2Gi
            limits:
              memory: 2Gi
          persistence:
            config:
              storageClass: longhorn
          ingress:
            enabled: true
            className: traefik
            host: tv.transmission.d3adb5.ca
            tls:
              enabled: true
              secretName: transmission-tv-tls
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt
              traefik.ingress.kubernetes.io/router.middlewares: {{ .Values.media.namespace }}-transmission-tv-oauth2-proxy@kubernetescrd
          peerService:
            type: LoadBalancer
            port: 32444
            externalTrafficPolicy: Local
            annotations:
              metallb.io/loadBalancerIPs: "192.168.1.37"
          extraEnv:
            - name: PEERPORT
              value: "32444"
            - name: TZ
              value: America/Vancouver
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          extraVolumes:
            - name: tv-library
              persistentVolumeClaim:
                claimName: {{ .Values.media.libraries.tv.claimName }}
          extraVolumeMounts:
            - name: tv-library
              mountPath: /downloads
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values: [ transmission ]
                  topologyKey: kubernetes.io/hostname

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.media.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true

  ignoreDifferences:
    - kind: Service
      jqPathExpressions:
        - .spec.ports[]?.nodePort
