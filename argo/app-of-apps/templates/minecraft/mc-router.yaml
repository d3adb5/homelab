apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mc-router
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: minecraft
  source:
    repoURL: https://itzg.github.io/minecraft-server-charts
    targetRevision: 1.5.0
    chart: mc-router

    helm:
      valuesObject:
        services:
          minecraft:
            type: LoadBalancer
            port: 25565
            annotations:
              metallb.io/loadBalancerIPs: "192.168.1.34"
          extraServiceSpec:
            externalTrafficPolicy: Local
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            memory: 64Mi

        minecraftRouter:
          metrics:
            backend: prometheus

        # Metrics are served on the api port; the chart has no monitor
        # resource of its own.
        extraDeploy:
          - |
            apiVersion: monitoring.coreos.com/v1
            kind: PodMonitor
            metadata:
              name: mc-router
            spec:
              selector:
                matchLabels:
                  app.kubernetes.io/name: mc-router
                  app.kubernetes.io/instance: mc-router
              podMetricsEndpoints:
                - port: api
                  path: /metrics

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.minecraft.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
