apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-controller
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: sealed-secrets

  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    targetRevision: 2.19.1
    chart: sealed-secrets

    helm:
      valuesObject:
        resources:
          limits:
            cpu: 100m
            memory: 256Mi

        metrics:
          serviceMonitor:
            enabled: true
          # Ships the chart's controller dashboard; the label is what the
          # grafana sidecar watches for across namespaces.
          dashboards:
            create: true
            labels:
              grafana_dashboard: "1"

  destination:
    namespace: {{ .Values.sealedSecrets.namespace }}
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
