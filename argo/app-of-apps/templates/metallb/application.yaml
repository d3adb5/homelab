apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: metallb

  sources:
    - repoURL: https://metallb.github.io/metallb
      targetRevision: 0.16.1
      chart: metallb

      helm:
        valuesObject:
          speaker:
            ignoreExcludeLB: true

          prometheus:
            # Metrics are served over TLS and authorized through TokenReview,
            # so the chart binds RBAC to Prometheus' service account.
            serviceAccount: kube-prometheus-stack-prometheus
            namespace: {{ .Values.monitoring.namespace }}
            serviceMonitor:
              enabled: true

    - repoURL: {{ .Values.repository.homelab.url }}
      targetRevision: {{ .Values.repository.homelab.targetRevision }}
      path: argo/metallb

  destination:
    namespace: {{ .Values.metallb.namespace }}
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: bgppeers.metallb.io
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle
