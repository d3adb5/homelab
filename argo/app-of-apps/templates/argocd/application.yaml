apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: argocd

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 10.1.4

    helm:
      valuesObject:
        global:
          domain: argocd.d3adb5.ca
          networkPolicy:
            create: true
            defaultDenyIngress: true

        configs:
          params:
            server.insecure: true
          cm:
            resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
              jsonPointers:
                - /spec/preserveUnknownFields
            oidc.config: |
              name: Keycloak
              issuer: https://id.d3adb5.ca/realms/core
              clientID: argocd
              clientSecret: $oidc.keycloak.clientSecret
              requestedScopes: ["openid", "profile", "email", "groups"]
          rbac:
            policy.csv: |
              g, /Admin,   role:admin
              g, /Argo CD, role:readonly

        controller:
          replicas: 1
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true

        redis-ha:
          enabled: true
          networkPolicy:
            enabled: true
            egressRules:
              - selectors:
                  - ipBlock:
                      cidr: 10.96.0.10/32
                  - ipBlock:
                      cidr: 169.254.169.254/32
                ports:
                  - port: 53
                    protocol: UDP
                  - port: 53
                    protocol: TCP
          haproxy:
            networkPolicy:
              enabled: true
              egressRules:
                - selectors:
                    - ipBlock:
                        cidr: 10.96.0.10/32
                    - ipBlock:
                        cidr: 169.254.169.254/32
                  ports:
                    - port: 53
                      protocol: UDP
                    - port: 53
                      protocol: TCP

        server:
          autoscaling:
            enabled: true
            minReplicas: 2
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              cert-manager.io/cluster-issuer: "letsencrypt"
            tls: true

        repoServer:
          autoscaling:
            enabled: true
            minReplicas: 2
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true

        applicationSet:
          replicas: 2
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true

        notifications:
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.argocd.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
