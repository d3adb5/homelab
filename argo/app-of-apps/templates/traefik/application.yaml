apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: traefik

  source:
    repoURL: https://traefik.github.io/charts
    targetRevision: 41.0.2
    chart: traefik

    helm:
      valuesObject:
        deployment:
          replicas: 3

        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            nodeTaintsPolicy: Honor
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: traefik

        service:
          annotations:
            metallb.io/loadBalancerIPs: 192.168.1.32

        ingressClass:
          enabled: true
          isDefaultClass: true

        providers:
          kubernetesIngress:
            publishedService:
              enabled: true

        ports:
          web:
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
                  permanent: true

        # Ingress NGINX never verified upstream certificates, e.g. for
        # backend-protocol: HTTPS services like Keycloak.
        additionalArguments:
          - --serversTransport.insecureSkipVerify=true

        accessLog:
          enabled: true

  destination:
    namespace: {{ .Values.traefik.namespace }}
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
