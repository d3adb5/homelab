# Calico ships no monitor resources; these follow the upstream guide at
# https://docs.tigera.io/calico/latest/operations/monitor/monitor-component-metrics
apiVersion: v1
kind: Service
metadata:
  name: felix-metrics
  namespace: calico-system
  labels:
    k8s-app: felix-metrics
spec:
  clusterIP: None
  selector:
    k8s-app: calico-node
  ports:
    - name: metrics
      port: 9091
      targetPort: 9091
---
apiVersion: v1
kind: Service
metadata:
  name: typha-metrics
  namespace: calico-system
  labels:
    k8s-app: typha-metrics
spec:
  clusterIP: None
  selector:
    k8s-app: calico-typha
  ports:
    - name: metrics
      port: 9093
      targetPort: 9093
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: felix-metrics
  namespace: calico-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      k8s-app: felix-metrics
  endpoints:
    - port: metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: typha-metrics
  namespace: calico-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      k8s-app: typha-metrics
  endpoints:
    - port: metrics
---
# kube-controllers has metrics enabled by default on 9094 and the
# operator creates the calico-kube-controllers-metrics Service itself.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-controllers-metrics
  namespace: calico-system
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      k8s-app: calico-kube-controllers
  endpoints:
    - targetPort: 9094
