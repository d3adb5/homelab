machine:
  install:
    disk: /dev/nvme0n1
  certSANs:
    - ottawa.home.arpa
    - 192.168.1.11

cluster:
  apiServer:
    certSANs:
      - ottawa.home.arpa
      - 192.168.1.11
  extraManifests:
    - https://raw.githubusercontent.com/alex1989hu/kubelet-serving-cert-approver/main/deploy/standalone-install.yaml
    - https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: ottawa.home.arpa
