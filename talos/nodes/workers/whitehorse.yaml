machine:
  install:
    disk: /dev/nvme0n1
  nodeLabels:
    feature.node.kubernetes.io/gpu.present: "true"
  kernel:
    modules:
      - name: nvidia
      - name: nvidia_uvm
      - name: nvidia_drm
      - name: nvidia_modeset
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: whitehorse.home.arpa
